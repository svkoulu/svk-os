# Builds, signs and publishes the four fleet images to GHCR, on two channels.
#
# Why weekly: these are CUSTOM bootc images, so they do NOT inherit upstream updates
# automatically. The scheduled rebuild is how new kernels and security fixes reach
# the fleet. If this pipeline silently stops, machines silently stop getting security
# updates — see the "Fail loudly" note in the README for wiring a failure alert.
#
# Channels (see .github/workflows/build-images.yml for the fan-out):
#   - git tag `N`  -> stable   (:stable, :stable-N, :stable-N-DATE)  — the fleet tracks :stable
#   - push to main -> testing  (:testing, :latest, :testing-DATE)    — dev/test
#   - weekly cron  -> BOTH: stable rebuilt from the latest git tag (security, no new
#                    code) + testing rebuilt from main.
#   - dispatch     -> both | stable | testing (input)
# This `setup` job decides which channel(s) to build and their refs; the two calls
# below run the reusable workflow accordingly.
name: build

on:
  schedule:
    - cron: "0 6 * * 1"      # Mondays 06:00 UTC
  push:
    branches: [main]         # -> testing
    tags: ["*"]              # -> stable
  workflow_dispatch:
    inputs:
      channel:
        description: Which channel(s) to build.
        type: choice
        default: both
        options: [both, stable, testing]

permissions:
  contents: read
  packages: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      do_stable: ${{ steps.p.outputs.do_stable }}
      do_testing: ${{ steps.p.outputs.do_testing }}
      stable_ref: ${{ steps.p.outputs.stable_ref }}
      stable_major: ${{ steps.p.outputs.stable_major }}
      date: ${{ steps.p.outputs.date }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0        # need tags for `git describe`
      - id: p
        env:
          EVENT: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          DISPATCH_CH: ${{ github.event.inputs.channel }}
        run: |
          set -euo pipefail
          do_stable=false; do_testing=false
          stable_ref=""; stable_major=""
          date="$(date -u +%Y%m%d)"

          # Latest git tag, if any (stable is always built from a tag, never main HEAD).
          latest_tag=""
          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            latest_tag="$(git describe --tags --abbrev=0)"
          fi
          want_stable() {
            if [ -n "$latest_tag" ]; then
              do_stable=true; stable_major="$latest_tag"; stable_ref="$latest_tag"
            else
              echo "No git tag yet -> skipping stable channel."
            fi
          }

          case "$EVENT" in
            push)
              if [ "$REF_TYPE" = "tag" ]; then
                do_stable=true; stable_major="$REF_NAME"; stable_ref="$REF_NAME"
              else
                do_testing=true
              fi
              ;;
            schedule)
              do_testing=true; want_stable
              ;;
            workflow_dispatch)
              case "$DISPATCH_CH" in
                both)    do_testing=true; want_stable ;;
                testing) do_testing=true ;;
                stable)  want_stable ;;
              esac
              ;;
          esac

          {
            echo "do_stable=$do_stable"
            echo "do_testing=$do_testing"
            echo "stable_ref=$stable_ref"
            echo "stable_major=$stable_major"
            echo "date=$date"
          } >> "$GITHUB_OUTPUT"

  stable:
    needs: setup
    if: needs.setup.outputs.do_stable == 'true'
    uses: ./.github/workflows/build-images.yml
    with:
      channel: stable
      ref: ${{ needs.setup.outputs.stable_ref }}
      major: ${{ needs.setup.outputs.stable_major }}
      date: ${{ needs.setup.outputs.date }}
    secrets: inherit

  testing:
    needs: setup
    if: needs.setup.outputs.do_testing == 'true'
    uses: ./.github/workflows/build-images.yml
    with:
      channel: testing
      ref: main
      date: ${{ needs.setup.outputs.date }}
    secrets: inherit

  # ---- Installer ISOs: rebuilt on every push (main -> testing, tag -> stable),
  # after that channel's images land in GHCR (the ISO pulls svk-<flavor>:<channel>).
  # Restricted to push events so the weekly cron and manual dispatch only refresh the
  # images, not the slow, large ISOs — run those on demand via iso.yml directly. ----
  stable-iso:
    needs: [setup, stable]
    if: needs.setup.outputs.do_stable == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/iso.yml
    with:
      channel: stable
    secrets: inherit

  testing-iso:
    needs: [setup, testing]
    if: needs.setup.outputs.do_testing == 'true' && github.event_name == 'push'
    uses: ./.github/workflows/iso.yml
    with:
      channel: testing
    secrets: inherit
