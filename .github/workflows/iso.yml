# Builds installer ISOs for the two desktop images, on demand.
#
# Separate from build.yml on purpose: ISOs are only needed when provisioning new
# hardware, are slow to build, and produce large artifacts. Run it by hand from
# the Actions tab (workflow_dispatch). Existing machines never need this — they
# `bootc switch` / auto-update from the registry.
name: iso

on:
  workflow_dispatch:
    inputs:
      image:
        description: Which ISO(s) to build.
        type: choice
        default: both
        options: [both, svk-student, svk-staff]

env:
  REGISTRY: ghcr.io
  NAMESPACE: svkoulu

permissions:
  contents: read
  packages: read

jobs:
  iso:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [svk-student, svk-staff]
    steps:
      - name: Should this image build?
        id: gate
        run: |
          want='${{ inputs.image }}'
          if [ "$want" = "both" ] || [ "$want" = "${{ matrix.image }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      # bootc-image-builder needs room to pull the (multi-GB) image AND
      # materialize a full rootfs + ISO on top of it. Default ubuntu-latest
      # runners only have ~14GB free once preinstalled toolchains (dotnet,
      # Android SDK, GHC, CodeQL...) are accounted for — not enough. Strip
      # those first. Same fix ublue-os/image-template's build-disk.yml uses.
      - name: Maximize build space
        if: steps.gate.outputs.run == 'true'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Login to GHCR
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login "${REGISTRY}" \
            -u "${{ github.actor }}" --password-stdin

      - name: Build ISO with bootc-image-builder
        if: steps.gate.outputs.run == 'true'
        run: |
          set -euo pipefail
          IMG="${REGISTRY}/${NAMESPACE}/${{ matrix.image }}:latest"
          mkdir -p output
          # bootc-image-builder (BIB) turns a bootc image into installer media.
          # It reads the image from the host's container storage, so pull first.
          sudo podman pull "$IMG"
          # --rootfs: our images carry no /usr/lib/bootc/install config, so BIB
          # can't infer a default fs type from the container alone. Bluefin
          # (what svk-student/svk-staff build FROM) uses btrfs.
          sudo podman run --rm --privileged \
            --security-opt label=type:unconfined_t \
            -v "$(pwd)/output":/output \
            -v /var/lib/containers/storage:/var/lib/containers/storage \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --type iso \
            --rootfs btrfs \
            --local \
            "$IMG"

      - name: Upload ISO artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.image }}-iso
          # BIB writes the ISO under output/bootiso/install.iso
          path: output/bootiso/*.iso
          if-no-files-found: error
