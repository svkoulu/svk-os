# Builds installer ISOs for the two desktop images with Titanoboa.
#
# Titanoboa squashfs's a throwaway "installer image" (see iso/build-iso.sh +
# iso/installer/) into a live-boot ISO; that installer image bakes the offline
# flatpak set + Anaconda, so first boot needs no network. ISOs are only needed when
# provisioning new hardware, are slow, and produce large artifacts. Existing machines
# never need this — they auto-update from the registry.
#
# Runs two ways:
#   - Reusable (workflow_call): build.yml calls this per channel AFTER that channel's
#     images are pushed, so a push to main (testing) or a git tag (stable) refreshes
#     the installer ISOs alongside the images — same channel routing as build.yml.
#     The ISO pulls svk-<flavor>:<channel> from GHCR, so it MUST run after the image
#     build, which is why build.yml chains it with `needs` rather than triggering here.
#   - Manual (workflow_dispatch): on-demand run from the Actions tab, pick image +
#     channel (e.g. to rebuild an ISO without republishing the images).
name: iso

on:
  workflow_call:
    inputs:
      channel:
        description: stable | testing.
        required: true
        type: string
      image:
        description: Which ISO(s) to build.
        required: false
        type: string
        default: both
  workflow_dispatch:
    inputs:
      image:
        description: Which ISO(s) to build.
        type: choice
        default: both
        options: [both, svk-student, svk-staff]
      channel:
        description: Which channel to bake (stable needs at least one cut git tag).
        type: choice
        default: stable
        options: [stable, testing]

env:
  REGISTRY: ghcr.io
  NAMESPACE: svkoulu

permissions:
  contents: read
  packages: read

jobs:
  iso:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        flavor: [student, staff]
    steps:
      - name: Should this flavor build?
        id: gate
        run: |
          want='${{ inputs.image }}'
          if [ "$want" = "both" ] || [ "$want" = "svk-${{ matrix.flavor }}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v7

      # Titanoboa materializes a full live rootfs + ISO; the default runner's free
      # space isn't enough. Strip preinstalled toolchains first (same fix build.yml
      # ISO jobs used historically).
      - name: Maximize build space
        if: steps.gate.outputs.run == 'true'
        uses: ublue-os/remove-unwanted-software@cc0becac701cf642c8f0a6613bbdaf5dc36b259e # v9
        with:
          remove-codeql: true

      - name: Login to GHCR (root's podman — Titanoboa runs under sudo)
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo podman login "${REGISTRY}" \
            -u "${{ github.actor }}" --password-stdin

      - name: Build ISO with Titanoboa
        if: steps.gate.outputs.run == 'true'
        run: bash iso/build-iso.sh "${{ matrix.flavor }}" ghcr "${{ inputs.channel }}"

      - name: Upload ISO artifact
        if: steps.gate.outputs.run == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: svk-${{ matrix.flavor }}-${{ inputs.channel }}-iso
          path: iso/svk-${{ matrix.flavor }}-*.iso
          if-no-files-found: error
