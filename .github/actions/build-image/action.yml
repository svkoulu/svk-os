# Composite action: lint (via the build), build, push and cosign-sign one image.
# Factored out so all four jobs share ONE copy of the signing logic — a drifted
# signing step is exactly the kind of silent breakage this repo is trying to avoid.
#
# Channel/tag scheme (channel + major + date come from the caller so base and derived
# agree on one date):
#   stable  -> :stable, :stable-<N>, :stable-<N>-<date>   version stable-<N>-<date>
#   testing -> :testing, :latest,    :testing-<date>      version testing-<date>
# The version string is baked into os-release + the image.version label, so tag /
# os-release / ISO all report one matching version.
name: build-image
description: Build, push and cosign-sign a bootc image with matching channel/version tags.

inputs:
  image:
    description: Image short name (svk-base, svk-student, ...).
    required: true
  containerfile:
    description: Path to the Containerfile.
    required: true
  registry:
    description: Registry host.
    required: true
  namespace:
    description: GHCR namespace (user/org).
    required: true
  username:
    description: Registry login user (usually github.actor).
    required: true
  password:
    description: Registry token (GITHUB_TOKEN).
    required: true
  cosign_key:
    description: cosign private key (PEM) from the COSIGN_PRIVATE_KEY secret.
    required: true
  cosign_password:
    description: Password for the cosign key ("" if generated password-less).
    required: false
    default: ""
  channel:
    description: stable | testing.
    required: true
  major:
    description: Release-line number (git tag N) for stable; "" for testing.
    required: false
    default: ""
  date:
    description: Build date YYYYMMDD, computed once by the caller so base + derived agree.
    required: true
  base_from:
    description: >
      Base image short name (e.g. svk-base). If set, this image is built FROM that
      image at the immutable tag produced THIS run (same channel+major+date) — so
      derived images pick up the base from the same run. Empty for svk-base/svk-server.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Compute version + tags
      shell: bash
      run: |
        CH="${{ inputs.channel }}"; MAJOR="${{ inputs.major }}"; DATE="${{ inputs.date }}"
        if [ "${CH}" = "stable" ]; then
          VERSION="stable-${MAJOR}-${DATE}"
          IMMUTABLE="stable-${MAJOR}-${DATE}"
          TAGS="stable stable-${MAJOR} ${IMMUTABLE}"   # rolling, per-line, pinned
        else
          VERSION="testing-${DATE}"
          IMMUTABLE="testing-${DATE}"
          TAGS="testing latest ${IMMUTABLE}"           # rolling, alias, pinned
        fi
        {
          echo "REPO=${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.image }}"
          echo "VERSION=${VERSION}"
          echo "TAGS=${TAGS}"
          echo "IMMUTABLE=${IMMUTABLE}"        # derived images build FROM base:IMMUTABLE
        } >> "$GITHUB_ENV"
        # Shared retry wrapper — retries only transient network/registry failures.
        echo "RETRY=${{ github.action_path }}/../../scripts/retry.sh" >> "$GITHUB_ENV"

    - name: Registry login
      shell: bash
      # The token goes through env + an inner shell so each retry attempt gets its own
      # copy on stdin (piping into retry.sh would leave later attempts with empty stdin).
      env:
        REGISTRY_TOKEN: ${{ inputs.password }}
      run: |
        "${RETRY}" 5 bash -c '
          echo "${REGISTRY_TOKEN}" | podman login "${{ inputs.registry }}" \
            -u "${{ inputs.username }}" --password-stdin'

    # Pull the FROM image up front, on its own, with retries. The quay/GHCR CDNs drop
    # blobs mid-transfer often enough that this was the single most common CI failure
    # ("writing blob: ... unexpected EOF"), and a silently un-rebuilt image means the
    # fleet silently stops getting updates. Doing it here means a flaky pull costs a
    # retry of the pull, not of the whole build.
    - name: Pull base image
      shell: bash
      run: |
        if [ -n "${{ inputs.base_from }}" ]; then
          BASE_REF="${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.base_from }}:${IMMUTABLE}"
        else
          # Last FROM in the manifest is the real base (earlier ones are `scratch AS ctx`).
          BASE_REF="$(awk '$1 == "FROM" { last = $2 } END { print last }' "${{ inputs.containerfile }}")"
          # name:tag@sha256:... -> name@sha256:... (pull the digest; the tag is decoration)
          case "${BASE_REF}" in
            *@sha256:*)
              name="${BASE_REF%@*}"; digest="${BASE_REF#*@}"
              case "${name##*/}" in *:*) name="${name%:*}" ;; esac
              BASE_REF="${name}@${digest}"
              ;;
          esac
        fi
        echo "Base image: ${BASE_REF}"
        if [ "${BASE_REF}" != "scratch" ]; then
          "${RETRY}" 5 podman pull "${BASE_REF}"
        fi

    - name: Build
      shell: bash
      # `bootc container lint` runs as the final RUN in every Containerfile, so
      # a lint failure fails THIS build step loudly. Nothing is pushed if it does.
      #
      # Retried too (dnf mirrors and the tailscale repo can also blink), but only on a
      # transient signature — retry.sh will NOT re-run a lint or package failure.
      run: |
        args=(--build-arg "VERSION=${VERSION}" --build-arg "GIT_SHA=${{ github.sha }}")
        if [ -n "${{ inputs.base_from }}" ]; then
          args+=(--build-arg "BASE_IMAGE=${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.base_from }}:${IMMUTABLE}")
        fi
        for t in ${TAGS}; do args+=(-t "${REPO}:${t}"); done
        "${RETRY}" 3 podman build -f "${{ inputs.containerfile }}" "${args[@]}" .

    - name: Push
      shell: bash
      run: |
        # Push every tag; capture the digest from the first so we sign the exact
        # bytes (all tags resolve to the same digest -> one signature covers them).
        first=1
        for t in ${TAGS}; do
          if [ "${first}" = 1 ]; then
            "${RETRY}" 5 podman push --digestfile=/tmp/digest "${REPO}:${t}"; first=0
          else
            "${RETRY}" 5 podman push "${REPO}:${t}"
          fi
        done
        echo "DIGEST=$(cat /tmp/digest)" >> "$GITHUB_ENV"

    - name: Sign
      shell: bash
      env:
        COSIGN_PRIVATE_KEY: ${{ inputs.cosign_key }}
        COSIGN_PASSWORD: ${{ inputs.cosign_password }}
      # Sign by digest: all pushed tags resolve to the same digest, so one
      # signature covers every tag. Machines verify this against cosign.pub
      # baked into the image (files/base/.../policy.json).
      #
      # cosign needs its own registry credentials here: it uses go-containerregistry's
      # keychain (~/.docker/config.json), which podman login never writes to (podman
      # keeps its own auth.json), so without these flags the pull-to-sign is anonymous
      # and GHCR returns UNAUTHORIZED.
      run: |
        "${RETRY}" 5 cosign sign --yes --key env://COSIGN_PRIVATE_KEY \
          --registry-username "${{ inputs.username }}" \
          --registry-password "${{ inputs.password }}" \
          "${REPO}@${DIGEST}"
