# Composite action: lint (via the build), build, push (:latest + :stable-DATE),
# and cosign-sign one image. Factored out so all four jobs share ONE copy of the
# signing logic — a drifted signing step is exactly the kind of silent breakage
# this repo is trying to avoid.
name: build-image
description: Build, push (two tags) and cosign-sign a bootc image.

inputs:
  image:
    description: Image short name (svk-base, svk-student, ...).
    required: true
  containerfile:
    description: Path to the Containerfile.
    required: true
  registry:
    description: Registry host.
    required: true
  namespace:
    description: GHCR namespace (user/org).
    required: true
  username:
    description: Registry login user (usually github.actor).
    required: true
  password:
    description: Registry token (GITHUB_TOKEN).
    required: true
  cosign_key:
    description: cosign private key (PEM) from the COSIGN_PRIVATE_KEY secret.
    required: true
  cosign_password:
    description: Password for the cosign key ("" if generated password-less).
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Compute tags
      shell: bash
      run: |
        echo "REPO=${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.image }}" >> "$GITHUB_ENV"
        echo "DATE_TAG=stable-$(date -u +%Y%m%d)" >> "$GITHUB_ENV"

    - name: Registry login
      shell: bash
      run: |
        echo "${{ inputs.password }}" | podman login "${{ inputs.registry }}" \
          -u "${{ inputs.username }}" --password-stdin

    - name: Build
      shell: bash
      # `bootc container lint` runs as the final RUN in every Containerfile, so
      # a lint failure fails THIS build step loudly. Nothing is pushed if it does.
      run: |
        podman build \
          -f "${{ inputs.containerfile }}" \
          -t "${REPO}:latest" \
          -t "${REPO}:${DATE_TAG}" \
          .

    - name: Push
      shell: bash
      run: |
        # Capture the manifest digest so we sign the exact bytes we pushed.
        podman push --digestfile=/tmp/digest "${REPO}:latest"
        podman push "${REPO}:${DATE_TAG}"
        echo "DIGEST=$(cat /tmp/digest)" >> "$GITHUB_ENV"

    - name: Sign
      shell: bash
      env:
        COSIGN_PRIVATE_KEY: ${{ inputs.cosign_key }}
        COSIGN_PASSWORD: ${{ inputs.cosign_password }}
      # Sign by digest: both tags resolve to the same digest, so one signature
      # covers :latest and :stable-DATE. Machines verify this against cosign.pub
      # baked into the image (files/base/.../policy.json).
      run: |
        cosign sign --yes --key env://COSIGN_PRIVATE_KEY "${REPO}@${DIGEST}"
