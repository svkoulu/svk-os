# opilas's OS/session display language: Finnish. Lives under /etc/skel (not
# baked into a build-time home — bootc drops /var/home) so it's replanted into
# /home/opilas every time reset-opilas-home.sh copies skel back in.
#
# systemd's user manager (and pam_systemd on session start) reads
# environment.d files and exports these into the graphical session — this is
# the supported per-user way to set locale without touching AccountsService,
# whose /var/lib/AccountsService state isn't persisted the same way (see
# reset-opilas-home.sh). Needs glibc-langpack-fi (build.base.sh) for the
# fi_FI.UTF-8 locale data to actually exist.
LANG=fi_FI.UTF-8
LANGUAGE=fi_FI:fi
