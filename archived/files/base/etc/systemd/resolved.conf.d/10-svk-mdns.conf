# Let Avahi own mDNS (.local). systemd-resolved also has a multicast-DNS
# responder; if it grabs UDP 5353 first, avahi-daemon fails to start and no
# device advertises its <hostname>.local name. Turning resolved's mDNS off keeps
# a single, predictable responder. Inert on images that don't use resolved.
[Resolve]
MulticastDNS=no
