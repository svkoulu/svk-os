# Staff roam off-site. Primary resolver is the self-hosted AdGuard Home (fast
# local cache + self-hosted blocklists on campus); NextDNS is the fallback
# upstream so a staff laptop stays filtered even when it can't reach the
# server at all — opportunistic DoT means it also still works against plain
# resolvers if either hop can't do TLS.
#
# (my.nextdns.io -> Setup -> Router/Other -> DNS-over-TLS). Anycast IPs below
# are NextDNS's documented DoT endpoints; only the profile id changes per
# customer.
[Resolve]
DNS=svk-server.local 45.90.28.0#f6b9f6.dns1.nextdns.io 45.90.30.0#f6b9f6.dns2.nextdns.io
DNSOverTLS=opportunistic
Domains=~.
