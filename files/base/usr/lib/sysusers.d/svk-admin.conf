# svk `admin` operator — declared for systemd-sysusers so it is NOT baked into
# the image's /etc/passwd at build time (that's what `bootc container lint`'s
# sysusers check flags). The account is created at first boot instead:
#   - uid/gid 980 (system range → hidden from the GDM greeter)
#   - locked password (sysusers creates it locked → key-only SSH, no password login)
#   - member of `wheel` (sshd allows only group wheel; sudoers.d grants NOPASSWD)
#   - home /var/home/admin is created by tmpfiles.d/svk-admin.conf (sysusers does
#     not create home dirs — /var/home is machine state a bootc image can't carry)
#
#Type  Name   ID   GECOS         Home             Shell
u      admin  980  "SVK-Admin"   /var/home/admin  /bin/bash
m      admin  wheel
