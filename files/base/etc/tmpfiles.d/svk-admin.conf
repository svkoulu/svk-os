# PERMANENT home directory for the admin operator.
#
# Despite living under tmpfiles.d, this is NOT a temporary/volatile dir: the `d`
# type only creates the directory if it's missing and fixes its mode/owner — it
# never deletes it, and with no age field (the trailing `-`) the tmpfiles-clean
# timer never touches it. Once created it persists across reboots and image
# updates like any other /var content.
#
# We create it here rather than baking it into the image because the account is
# declared via sysusers.d (usr/lib/sysusers.d/svk-admin.conf) but /var/home is
# machine-state that a bootc image does not carry. This is the standard bootc
# pattern for a persistent home
# under /var. (The server does the equivalent once, via Ignition in server.bu.)
d /var/home/admin 0700 admin admin -
