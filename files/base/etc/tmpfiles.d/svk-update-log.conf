# Directory for the update wrappers' durable log (svk-update-image,
# svk-update-flatpak) — /var/log is real, persistent storage on an ostree/bootc
# system, unlike /tmp or /boot. Same "d" idiom as svk-admin.conf: create if
# missing, fix mode/owner, never delete (no age field).
d /var/log/svk 0750 root root -
