# svk fleet SSH policy — every desktop (base -> opilas kiosk / staff).
# Hardened, key-only. Numbered 10- so it wins over the distro defaults
# (40-/50-*.conf): sshd takes the first value seen for each keyword.

# admin's keys live in /etc (see /etc/ssh/authorized_keys.d/admin); /var/home is
# not captured in the image, so we can't keep them in ~/.ssh.
AuthorizedKeysFile .ssh/authorized_keys /etc/ssh/authorized_keys.d/%u

# --- Authentication: public key ONLY ----------------------------------------
PubkeyAuthentication yes
AuthenticationMethods publickey
PasswordAuthentication no
PermitEmptyPasswords no
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
GSSAPIAuthentication no
KerberosAuthentication no
HostbasedAuthentication no
IgnoreRhosts yes

# --- Who may log in ---------------------------------------------------------
PermitRootLogin no
# Only the admin operator (in wheel) reaches these boxes over SSH — from the LAN
# directly, or via the server jump host. The opilas kiosk user and staff log in
# at the console/GDM, never over SSH.
AllowGroups wheel
MaxAuthTries 3
MaxSessions 4
LoginGraceTime 20

# --- No forwarding on endpoint machines -------------------------------------
# These are leaf nodes, never jump hosts (the server overrides AllowTcpForwarding
# because it fans out to the LAN). Deny every forwarding/tunnel channel here.
AllowTcpForwarding no
AllowAgentForwarding no
AllowStreamLocalForwarding no
GatewayPorts no
PermitTunnel no
X11Forwarding no
PermitUserEnvironment no

# --- Modern crypto only (overrides system crypto-policies for sshd) ---------
# The whole fleet is current OpenSSH with Ed25519 keys, so we can be strict.
KexAlgorithms sntrup761x25519-sha512@openssh.com,curve25519-sha256,curve25519-sha256@libssh.org
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com
HostKeyAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,rsa-sha2-512,rsa-sha2-256
PubkeyAcceptedAlgorithms ssh-ed25519,ssh-ed25519-cert-v01@openssh.com,sk-ssh-ed25519@openssh.com,rsa-sha2-512,rsa-sha2-256

# --- Hygiene ----------------------------------------------------------------
ClientAliveInterval 300
ClientAliveCountMax 3
TCPKeepAlive no
Compression no
