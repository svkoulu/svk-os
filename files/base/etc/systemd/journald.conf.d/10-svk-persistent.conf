# Force persistent journal storage rather than relying on systemd's default
# Storage=auto (persistent only if /var/log/journal already exists, which isn't
# guaranteed on a freshly-provisioned /var). Needed so the full raw output of an
# update run — captured automatically by systemd for any unit — survives the
# same reboot the update may have just triggered. /var/log/svk/update.log
# (svk-update-log.conf) is the durable one-line-per-run summary; this is the
# detailed trace behind it.
[Journal]
Storage=persistent
