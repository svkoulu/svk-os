# Route ghcr.io through the school's local pull-through cache.
#
# This single drop-in covers BOTH upstream layers (ublue-os/*) and our OWN
# images (<<GHCR_NAMESPACE>>/school-*), because ours also live on ghcr.io.
#
# It is a NON-EXCLUSIVE mirror: Podman tries the local cache first and falls
# back to ghcr.io automatically if the cache host is down or unreachable. That
# fallback is what keeps a laptop bootable when it's off the school network
# (e.g. a staff machine at home). "Exclusive" would be `pull-from-mirror` set so
# the primary is never tried — we deliberately do NOT do that.
#
# The server image does NOT ship this file — it must reach the real ghcr.io to
# fill the cache.

[[registry]]
location = "ghcr.io"

[[registry.mirror]]
location = "<<REGISTRY_CACHE_HOST>>"
# Uncomment if the cache serves plain HTTP (e.g. over Tailscale without TLS).
# Prefer real TLS if you can; insecure disables cert + registry verification.
# insecure = true
