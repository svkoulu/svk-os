# Per-image Tailscale config. The enrollment MECHANISM lives in the base image
# (svk-tailscale-enroll.service / .sh); this file is the per-image DATA it reads.
# Derived images (student, staff) ship their own copy that overrides this one;
# the server ships its own too.
#
#   TAILSCALE_TAG    — the ACL tag this machine advertises, and the prefix
#                      svk-claim-hostname.sh uses for fallback hostnames.
#   TAILSCALE_ENROLL — yes/no. "yes" = on first boot, read the auth key from the
#                      provisioning USB (filesystem label SVK-PROV, file
#                      "tailscale-authkey") and run `tailscale up`. Keys are
#                      NEVER baked into an image.
#
# This base default is deliberately "no" so nothing enrolls unless an image opts
# in. base is never deployed on its own, so the tag is just a placeholder.
TAILSCALE_TAG="tag:svk-node"
TAILSCALE_ENROLL="no"
