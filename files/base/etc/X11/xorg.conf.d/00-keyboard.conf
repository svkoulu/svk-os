# Fleet-wide Finnish keyboard layout (school is in Finland). Read by GDM and
# by X11/Xwayland; the equivalent GNOME/Wayland default lives in
# etc/dconf/db/local.d/00-svk-desktop (org/gnome/desktop/input-sources). This
# is the same file `localectl set-x11-keymap fi` would generate — written
# statically since localectl needs a running systemd/dbus, unavailable during
# a container build.
Section "InputClass"
        Identifier "system-keyboard"
        MatchIsKeyboard "on"
        Option "XkbLayout" "fi"
EndSection
