# The server enrolls via Ignition (server.bu writes the key to
# /etc/svk/tailscale-authkey and runs `tailscale up`), NOT via the USB flow — so
# TAILSCALE_ENROLL is "no" here. This file just carries the tag that server.bu's
# svk-tailscale-up unit advertises.
TAILSCALE_TAG="tag:svk-admin"
TAILSCALE_ENROLL="no"
