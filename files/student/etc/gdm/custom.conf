# GDM config for the kiosk. Autologin straight into the `opilas` account (declared
# via usr/lib/sysusers.d/svk-opilas.conf) — no greeter, no password prompt. GDM's
# autologin PAM stack does not check the password, so the sysusers-locked account
# logs in fine.
[daemon]
AutomaticLoginEnable=True
AutomaticLogin=opilas

[security]

[xdmcp]

[chooser]

[debug]
