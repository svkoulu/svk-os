# Student kiosks are NOT on the tailnet (50-device cap). tailscaled is disabled
# in build.student.sh and enrollment is off here, so the provisioning USB is
# ignored on student machines — which is exactly why the SAME USB can be used to
# install both student and staff devices. The tag is kept only so the hostname
# claim produces friendly svk-student-* names.
TAILSCALE_TAG="tag:svk-student"
TAILSCALE_ENROLL="no"
