# Students never leave campus (see README networking section), so DNS is
# fail-closed: the self-hosted AdGuard Home resolver only, no fallback. If the
# server is unreachable, DNS resolution fails rather than silently falling
# through to an unfiltered upstream — correct behavior for a kiosk.
#
# VERIFY ON REAL HARDWARE (see TODO.md §11-style items): NetworkManager
# usually pushes DHCP-supplied nameservers into resolved as per-link DNS,
# which can take priority over this global setting. If that happens here,
# the fix is `ipv4.ignore-auto-dns=yes` / `ipv6.ignore-auto-dns=yes` on the
# baked Wi-Fi profile (files/student/etc/NetworkManager/system-connections/).
[Resolve]
DNS=svk-server.local 45.90.28.0#76fc42.dns1.nextdns.io 45.90.30.0#76fc42.dns2.nextdns.io
DNSOverTLS=opportunistic
Domains=~.
