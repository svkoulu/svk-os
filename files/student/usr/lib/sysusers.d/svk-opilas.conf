# opilas — the autologin kiosk student account. Declared for systemd-sysusers so
# it is NOT baked into /etc/passwd (bootc container lint requires this). It is
# deliberately NOT in `wheel` (no sudo) and SSH is closed to it (sshd allows only
# group wheel). GDM autologin (files/student/etc/gdm/custom.conf) logs it in
# without a password check, so the sysusers-locked password is fine. Its home
# (/var/home/opilas) is created and reset from /etc/skel by reset-opilas-home.service.
#
#Type  Name    ID    GECOS                    Home             Shell
u      opilas  1000  "Kiosk student (opilas)" /var/home/opilas /bin/bash
